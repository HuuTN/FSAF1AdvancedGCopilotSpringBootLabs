# Test Configuration
# Database Configuration
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/phucdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: phucdb
    password: 77777
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
# Disable Actuator endpoints for tests
management:
  endpoints:
    enabled-by-default: false

# Logging configuration for tests  
logging:
  level:
    com.example.lab4: DEBUG
    org.springframework.security: DEBUG

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lab5db?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      pool-name: HikariCP
      max-lifetime: 600000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

management:
  endpoint:
    health:
      show-details: always
      show-components: always
      group:
        readiness:
          include: db,diskSpace
        liveness:
          include: ping
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    diskspace:
      enabled: true
    db:
      enabled: true

jwt:
  secret: yourSecretKey123!@#$%^&*()_+VerySecureKey
  expiration: 86400 # 24 hours in seconds
